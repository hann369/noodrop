  <link href="https://fonts.fontshare.com/css2/3fcsn86ceiws4xky7ev64mf521.css" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@300,400,500,600&display=swap" rel="stylesheet">

  <style>
    /* ── Particles ── */
    #particles-js { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Search ── */
    .search-wrap {
      max-width: 520px; margin: 0 auto 2rem; position: relative;
    }
    .search-wrap::before {
      content: "⌕";
      position: absolute; left: 1.2rem; top: 50%;
      transform: translateY(-50%);
      color: var(--m2); font-size: 1.1rem;
      pointer-events: none; z-index: 1;
    }
    #search {
      width: 100%; padding: 0.9rem 1.2rem 0.9rem 3rem;
      border: 1px solid var(--m3);
      border-radius: 100px;
      background: var(--bg-2);
      font-family: var(--font-body); font-size: 14px;
      color: var(--cream); font-weight: 300;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search:focus {
      outline: none; border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,84,26,0.1);
    }
    #search::placeholder { color: var(--m2); }
    body.light #search { background: #fff; color: #1C1C1A; }

    /* ── Categories ── */
    .categories {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      justify-content: center; margin-bottom: 2.5rem;
    }
    .category-btn {
      font-size: 12px; font-weight: 400; letter-spacing: 0.01em;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1px;
      background: var(--m4);
      border: 1px solid var(--m4);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 4rem;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-2);
      border-radius: 0;
      border: none;
      overflow: hidden;
      cursor: pointer;
      display: flex; flex-direction: column;
      transition: background 0.2s !important;
      box-shadow: none !important;
    }
    .card:hover {
      background: var(--bg-3) !important;
      transform: none !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }
    /* Entry animation */
    .card { opacity: 0; animation: cardIn 0.5s var(--ease-out) forwards; }
    .card:nth-child(1)  { animation-delay: 0.03s; }
    .card:nth-child(2)  { animation-delay: 0.06s; }
    .card:nth-child(3)  { animation-delay: 0.09s; }
    .card:nth-child(4)  { animation-delay: 0.12s; }
    .card:nth-child(5)  { animation-delay: 0.15s; }
    .card:nth-child(6)  { animation-delay: 0.18s; }
    .card:nth-child(7)  { animation-delay: 0.21s; }
    .card:nth-child(8)  { animation-delay: 0.24s; }
    .card:nth-child(n+9){ animation-delay: 0.27s; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    .card-image {
      height: 160px; overflow: hidden;
      background: var(--bg-3); flex-shrink: 0; position: relative;
    }
    .card-image img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s var(--ease-out);
      opacity: 0.9;
    }
    .card:hover .card-image img { transform: scale(1.04); }

    .card-category-badge {
      position: absolute; top: 0.7rem; left: 0.7rem;
      background: rgba(17,17,16,0.6);
      backdrop-filter: blur(8px);
      color: var(--m1); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.22rem 0.65rem;
      border-radius: 100px; font-weight: 500;
      border: 1px solid var(--m4);
    }

    .card-body { padding: 1.2rem 1.4rem 1.4rem; flex: 1; display: flex; flex-direction: column; }
    .card-name {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 400;
      color: var(--cream); margin-bottom: 0.5rem;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .card-desc {
      font-size: 13px; font-weight: 300;
      color: var(--m2); line-height: 1.65;
      margin-bottom: 1rem; flex: 1;
    }
    .card-benefits { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1rem; }
    .benefit-tag {
      font-size: 10px; padding: 3px 9px; border-radius: 100px;
      background: var(--orange-dim); color: var(--orange);
      font-weight: 500; letter-spacing: 0.03em;
      border: 1px solid rgba(232,84,26,0.15);
    }

    .card-footer-row { display: flex; justify-content: flex-end; }
    .card-arrow {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--m4); color: var(--m2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .card:hover .card-arrow {
      background: var(--orange); color: white;
      transform: translateX(2px);
    }

    /* Skeleton grid */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1px; background: var(--m4);
      border: 1px solid var(--m4); border-radius: 12px;
      overflow: hidden; margin-bottom: 4rem;
    }
    .skeleton-card { border-radius: 0; border: none; box-shadow: none; }
    body.light .skeleton { background: linear-gradient(90deg, #ede8e3 25%, #f5f2ef 50%, #ede8e3 75%); background-size: 600px 100%; }
  </style>
</head>

<script>
// ── Theme (dark-first: no class = dark) ──
(function() {
  var toggle = document.getElementById('themeToggle');
  var stored = localStorage.getItem('ndTheme'); // 'light' | null
  var isLight = stored === 'light';
  function applyTheme(light) {
    document.body.classList.toggle('light', light);
    if (toggle) toggle.classList.toggle('active', light);
    isLight = light;
  }
  applyTheme(isLight);
  if (toggle) {
    toggle.addEventListener('click', function() {
      applyTheme(!isLight);
      localStorage.setItem('ndTheme', isLight ? 'light' : '');
      isLight ? initLightParticles() : initDarkParticles();
    });
  }
  // Init correct particles
  window.addEventListener('DOMContentLoaded', function() {
    isLight ? initLightParticles() : initDarkParticles();
  });
})();

function initDarkParticles() {
  if (window.pJSDom && window.pJSDom.length) {
    window.pJSDom.forEach(function(p) { p.pJS.fn.vendors.destroypJS(); });
    window.pJSDom = [];
  }
  particlesJS('particles-js', {
    particles: {
      number: { value: 42, density: { enable: true, value_area: 1000 } },
      color: { value: '#E8541A' },
      shape: { type: 'circle' },
      opacity: { value: .12, random: true, anim: { enable: true, speed: .3, opacity_min: .02, sync: false } },
      size: { value: 1.5, random: true },
      line_linked: { enable: true, distance: 155, color: '#E8541A', opacity: .05, width: .6 },
      move: { enable: true, speed: .35, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
    },
    interactivity: {
      detect_on: 'canvas',
      events: { onhover: { enable: true, mode: 'grab' }, resize: true },
      modes: { grab: { distance: 180, line_linked: { opacity: .14 } } }
    },
    retina_detect: true
  });
}

function initLightParticles() {
  if (window.pJSDom && window.pJSDom.length) {
    window.pJSDom.forEach(function(p) { p.pJS.fn.vendors.destroypJS(); });
    window.pJSDom = [];
  }
  particlesJS('particles-js', {
    particles: {
      number: { value: 90, density: { enable: true, value_area: 900 } },
      color: { value: ['#1a1a1a', '#2c3e50', '#4b607f', '#8a7060'] },
      shape: { type: 'star', stroke: { width: 0 }, polygon: { nb_sides: 5 } },
      opacity: { value: .45, random: true, anim: { enable: true, speed: .5, opacity_min: .08, sync: false } },
      size: { value: 2.0, random: true, anim: { enable: true, speed: .6, size_min: .4, sync: false } },
      line_linked: { enable: false },
      move: { enable: true, speed: .32, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
    },
    interactivity: {
      detect_on: 'canvas',
      events: { onhover: { enable: true, mode: 'bubble' }, onclick: { enable: false }, resize: true },
      modes: { bubble: { distance: 130, size: 3.5, duration: 0.4, opacity: .7 } }
    },
    retina_detect: true
  });
}

// ── Auth ──
var authBtn = document.getElementById('authBtn');
authBtn.addEventListener('click', function() {
  firebase.auth().currentUser ? window.location.href = 'profile.html' : openAuthModal();
});
firebase.auth().onAuthStateChanged(function(user) {
  authBtn.textContent = user ? 'Profile' : 'Login';
});
function openAuthModal()  { document.getElementById('authModal').classList.add('open'); }
function closeAuthModal() {
  document.getElementById('authModal').classList.remove('open');
  document.getElementById('loginError').textContent = '';
  document.getElementById('signupError').textContent = '';
}
function switchAuthMode() {
  var isLogin = document.getElementById('loginForm').style.display !== 'none';
  document.getElementById('loginForm').style.display = isLogin ? 'none' : 'block';
  document.getElementById('signupForm').style.display = isLogin ? 'block' : 'none';
  document.getElementById('authTitle').textContent = isLogin ? 'Sign Up' : 'Login';
  document.getElementById('switchText').innerHTML = isLogin
    ? 'Already have an account? <a onclick="switchAuthMode()">Log in</a>'
    : 'No account? <a onclick="switchAuthMode()">Sign up</a>';
}
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  try {
    await firebase.auth().signInWithEmailAndPassword(
      document.getElementById('loginEmail').value,
      document.getElementById('loginPassword').value
    );
    closeAuthModal();
  } catch(err) { document.getElementById('loginError').textContent = err.message; }
});
document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  try {
    var cred = await firebase.auth().createUserWithEmailAndPassword(
      document.getElementById('signupEmail').value,
      document.getElementById('signupPassword').value
    );
    await firebase.firestore().collection('users').doc(cred.user.uid).set({
      email: cred.user.email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeAuthModal();
  } catch(err) { document.getElementById('signupError').textContent = err.message; }
});

// ── Cookie ──
function acceptCookies() {
  localStorage.setItem('cookiesAccepted', 'yes');
  document.getElementById('cookieConsent').style.display = 'none';
}
window.addEventListener('load', function() {
  if (!localStorage.getItem('cookiesAccepted'))
    document.getElementById('cookieConsent').style.display = 'flex';
});

// ── Data + Cards ──
function loadDataAndInitialize() {
  var s = document.createElement('script');
  s.src = 'data.js';
  s.onload = function() { initializeApp(); };
  s.onerror = function() {
    document.getElementById('loadingIndicator').innerHTML = '<p style="color:var(--m2)">Error loading compounds.</p>';
  };
  document.head.appendChild(s);
}

function initializeApp() {
  document.getElementById('loadingIndicator').style.display = 'none';
  var sk = document.getElementById('skeletonGrid');
  if (sk) sk.style.display = 'none';
  if (!window.compounds || !Array.isArray(window.compounds)) {
    document.getElementById('grid').innerHTML = '<p style="color:var(--m2);text-align:center;padding:2rem;">Error loading compounds.</p>';
    return;
  }
  renderCards(window.compounds);
  document.getElementById('search').addEventListener('input', function(e) {
    var t = e.target.value.toLowerCase();
    renderCards(window.compounds.filter(function(c) {
      return c.name.toLowerCase().includes(t) ||
        (c.description && c.description.toLowerCase().includes(t)) ||
        (c.category && c.category.toLowerCase().includes(t)) ||
        (c.benefits && c.benefits.some(function(b) { return b.toLowerCase().includes(t); }));
    }));
  });
  document.querySelectorAll('.category-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      document.querySelectorAll('.category-btn').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
      var cat = e.target.dataset.category;
      renderCards(cat === 'all' ? window.compounds : window.compounds.filter(function(c) { return c.category === cat; }));
    });
  });
}

function renderCards(list) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!list || !list.length) {
    grid.innerHTML = '<p style="color:var(--m2);text-align:center;padding:3rem;grid-column:1/-1;">No compounds found.</p>';
    return;
  }
  list.forEach(function(comp) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-image">' +
        '<img src="' + comp.image + '" alt="' + comp.name + '" loading="lazy" onerror="this.style.display=\'none\'">' +
        '<div class="card-category-badge">' + (comp.category || 'Nootropic') + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-name">' + comp.name + '</div>' +
        '<div class="card-desc">' + comp.description + '</div>' +
        '<div class="card-benefits">' +
          (comp.benefits || []).slice(0, 3).map(function(b) {
            return '<span class="benefit-tag">' + b + '</span>';
          }).join('') +
        '</div>' +
        '<div class="card-footer-row"><div class="card-arrow">→</div></div>' +
      '</div>';
    card.onclick = function() { window.location.href = 'compound.html?cid=' + comp.cid; };
    grid.appendChild(card);
  });
}

document.readyState === 'loading'
  ? document.addEventListener('DOMContentLoaded', loadDataAndInitialize)
  : loadDataAndInitialize();
</script>

<!-- Unified header JS -->
<script>
(function() {
  var burger = document.getElementById('ndBurger');
  var nav    = document.getElementById('ndNav');
  var header = document.getElementById('ndHeader');
  if (!burger || !nav) return;
  function openMenu() {
    nav.classList.add('is-open'); burger.classList.add('is-open');
    var bd = document.getElementById('ndNavBackdrop');
    if (bd) bd.classList.add('is-open');
    burger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }
  function closeMenu() {
    nav.classList.remove('is-open'); burger.classList.remove('is-open');
    var bd = document.getElementById('ndNavBackdrop');
    if (bd) bd.classList.remove('is-open');
    burger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }
  burger.addEventListener('click', function() {
    nav.classList.contains('is-open') ? closeMenu() : openMenu();
  });
  var closeBtn = document.getElementById('ndNavClose');
  if (closeBtn) closeBtn.addEventListener('click', closeMenu);
  var backdrop = document.getElementById('ndNavBackdrop');
  if (backdrop) backdrop.addEventListener('click', closeMenu);
  nav.querySelectorAll('.nd-nav__link').forEach(function(a) { a.addEventListener('click', closeMenu); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });
  window.addEventListener('resize', function() { if (window.innerWidth > 768) closeMenu(); });
  if (header) {
    window.addEventListener('scroll', function() {
      header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
  }
})();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
  });
}
</script>

document.addEventListener('DOMContentLoaded', function() { i18n.init(); });

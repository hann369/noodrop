<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library – Noodrop</title>

  <link rel="preconnect" href="https://fonts.fontshare.com">
  <link href="https://fonts.fontshare.com/css2/3fcsn86ceiws4xky7ev64mf521.css" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --cream: #e8d8c9;
      --slate: #4b607f;
      --orange: #f3701e;
      --white: #ffffff;
      --dark-slate: #2c3e50;
      --shadow: 0 10px 30px rgba(0,0,0,0.07);
      --bg: #fafaf8;

      /* Dark mode */
      --dark-bg: #0a0e17;
      --dark-text: #e0e0e0;
      --dark-card: rgba(22, 28, 42, 0.85);
      --dark-border: #1e2a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tabular', sans-serif;
      background: var(--bg);
      color: var(--dark-slate);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.35s, color 0.35s;
    }
    body.dark { background: var(--dark-bg); color: var(--dark-text); }

    /* Particles */
    #particles-js {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5%;
      background: rgba(250,250,248,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--cream);
      transition: background 0.35s, border-color 0.35s;
    }
    body.dark header {
      background: rgba(10,14,23,0.9);
      border-bottom-color: var(--dark-border);
    }
    .logo {
      font-family: 'Clash Display', 'Tabular', sans-serif;
      font-size: 1.4rem; font-weight: 700; color: var(--slate);
      transition: color 0.35s;
    }
    body.dark .logo { color: var(--dark-text); }

    nav a {
      text-decoration: none; color: var(--slate);
      margin: 0 0.9rem; font-weight: 500; font-size: 0.9rem;
      position: relative; transition: color 0.2s;
    }
    nav a::after {
      content: ""; position: absolute;
      width: 0; height: 2px; background: var(--orange);
      left: 0; bottom: -4px; transition: 0.3s;
    }
    nav a:hover::after, nav a.active::after { width: 100%; }
    nav a:hover, nav a.active { color: var(--orange); }
    body.dark nav a { color: var(--dark-text); }
    body.dark nav a:hover { color: var(--orange); }

    .header-right {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .auth-btn {
      background: var(--orange); color: white; border: none;
      padding: 0.45rem 1.1rem; border-radius: 50px;
      font-family: 'Tabular', sans-serif; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; transition: all 0.25s;
    }
    .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(243,112,30,0.35); }

    /* Dark mode toggle */
    .theme-toggle {
      width: 46px; height: 24px; border-radius: 50px;
      background: var(--cream); border: 1px solid rgba(0,0,0,0.08);
      cursor: pointer; position: relative; transition: background 0.3s;
      flex-shrink: 0;
    }
    body.dark .theme-toggle { background: #1e2a3a; border-color: #2a3a50; }
    .toggle-knob {
      width: 18px; height: 18px; border-radius: 50%;
      background: white; position: absolute;
      top: 2px; left: 2px; transition: transform 0.3s cubic-bezier(0.68,-0.55,0.27,1.55);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    body.dark .theme-toggle .toggle-knob {
      background: #4a90e2;
      transform: translateX(22px);
    }
    .theme-toggle.active .toggle-knob { transform: translateX(22px); background: var(--orange); }

    /* ── Page Hero ── */
    .page-hero {
      position: relative; z-index: 1;
      padding: 5rem 5% 3.5rem;
      max-width: 1200px; margin: 0 auto;
      display: flex; justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid var(--cream);
    }
    body.dark .page-hero { border-bottom-color: var(--dark-border); }

    .hero-left .eyebrow {
      font-size: 0.68rem; letter-spacing: 4px;
      text-transform: uppercase; color: var(--orange);
      margin-bottom: 0.8rem;
    }
    .hero-left h1 {
      font-family: 'Clash Display', 'Tabular', sans-serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 600; line-height: 1.05;
      letter-spacing: -1.5px; color: var(--slate);
      transition: color 0.35s;
    }
    body.dark .hero-left h1 { color: var(--dark-text); }
    .hero-left h1 em { font-style: normal; color: var(--orange); }

    .hero-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 1rem;
    }
    .hero-cta {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn-primary {
      background: var(--orange); color: white; border: none;
      padding: 0.7rem 1.6rem; border-radius: 50px;
      font-family: 'Tabular', sans-serif; font-weight: 700;
      font-size: 0.88rem; cursor: pointer; transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(243,112,30,0.3);
      text-decoration: none; display: inline-block;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(243,112,30,0.4); }
    .btn-secondary {
      background: transparent; color: var(--slate);
      border: 1.5px solid var(--cream);
      padding: 0.7rem 1.6rem; border-radius: 50px;
      font-family: 'Tabular', sans-serif; font-weight: 600;
      font-size: 0.88rem; cursor: pointer; transition: all 0.3s;
      text-decoration: none; display: inline-block;
    }
    body.dark .btn-secondary { color: var(--dark-text); border-color: var(--dark-border); }
    .btn-secondary:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-2px); }

    /* ── Container ── */
    .container {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto; padding: 2.5rem 5%;
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 560px; margin: 0 auto 2.5rem; position: relative;
    }
    .search-wrap::before {
      content: "⌕";
      position: absolute; left: 1.2rem; top: 50%;
      transform: translateY(-50%);
      color: #aab0bc; font-size: 1.1rem; pointer-events: none;
    }
    #search {
      width: 100%; padding: 0.9rem 1.2rem 0.9rem 3rem;
      border: 1.5px solid var(--cream); border-radius: 50px;
      background: white; font-family: 'Tabular', sans-serif;
      font-size: 0.95rem; color: var(--dark-slate);
      transition: all 0.25s; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    body.dark #search {
      background: var(--dark-card); border-color: var(--dark-border);
      color: var(--dark-text);
    }
    #search:focus {
      outline: none; border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(243,112,30,0.1);
    }
    #search::placeholder { color: #aab0bc; }

    /* ── Category filters ── */
    .categories {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      justify-content: center; margin-bottom: 3rem;
    }
    .category-btn {
      padding: 0.45rem 1.2rem; border-radius: 50px;
      border: 1.5px solid var(--cream);
      background: white; color: var(--slate);
      font-family: 'Tabular', sans-serif;
      font-weight: 600; font-size: 0.82rem;
      cursor: pointer; transition: all 0.25s;
    }
    body.dark .category-btn {
      background: var(--dark-card); border-color: var(--dark-border);
      color: var(--dark-text);
    }
    .category-btn:hover, .category-btn.active {
      background: var(--orange); color: white;
      border-color: var(--orange);
      box-shadow: 0 3px 12px rgba(243,112,30,0.25);
    }

    /* ── Loading ── */
    .loading-indicator {
      display: flex; flex-direction: column;
      align-items: center; padding: 4rem 0; color: #8a9ab0;
    }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2.5px solid rgba(243,112,30,0.2);
      border-top-color: var(--orange);
      animation: spin 0.9s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem; margin-bottom: 4rem;
    }

    /* ── Card ── */
    .card {
      background: white; border-radius: 18px;
      border: 1px solid var(--cream);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex; flex-direction: column;
    }
    body.dark .card {
      background: var(--dark-card); border-color: var(--dark-border);
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      border-color: rgba(243,112,30,0.3);
    }
    body.dark .card:hover { border-color: rgba(243,112,30,0.4); }

    .card-image {
      height: 180px; overflow: hidden;
      background: #f0ece8; flex-shrink: 0;
      position: relative;
    }
    body.dark .card-image { background: #141a27; }
    .card-image img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .card:hover .card-image img { transform: scale(1.04); }

    /* Category badge on image */
    .card-category-badge {
      position: absolute; top: 0.8rem; left: 0.8rem;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      color: white; font-size: 0.65rem; letter-spacing: 2px;
      text-transform: uppercase; padding: 0.25rem 0.7rem;
      border-radius: 20px; font-weight: 600;
    }

    .card-body { padding: 1.4rem 1.5rem 1.6rem; flex: 1; display: flex; flex-direction: column; }
    .card-name {
      font-family: 'Clash Display', 'Tabular', sans-serif;
      font-size: 1.2rem; font-weight: 600;
      color: var(--slate); margin-bottom: 0.6rem;
      transition: color 0.35s;
    }
    body.dark .card-name { color: var(--dark-text); }
    .card-desc {
      font-size: 0.86rem; color: #7a8a9a; line-height: 1.65;
      margin-bottom: 1.2rem; flex: 1;
    }
    body.dark .card-desc { color: #8a9ab0; }

    .card-benefits {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .benefit-tag {
      font-size: 0.7rem; padding: 3px 10px;
      border-radius: 20px;
      background: rgba(243,112,30,0.1); color: var(--orange);
      font-weight: 600;
    }
    body.dark .benefit-tag { background: rgba(243,112,30,0.15); }

    .card-footer-row {
      display: flex; justify-content: flex-end;
    }
    .card-arrow {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--orange); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; transition: transform 0.2s;
    }
    .card:hover .card-arrow { transform: translateX(3px); }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 2rem 0;
      border-top: 1px solid var(--cream);
      color: #8a9ab0; font-size: 0.85rem;
      transition: border-color 0.35s;
    }
    body.dark footer { border-top-color: var(--dark-border); }
    .social-links {
      display: flex; justify-content: center; gap: 1rem; margin-bottom: 0.8rem;
    }
    .social-link {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--cream); color: var(--slate);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: all 0.25s;
    }
    body.dark .social-link { background: var(--dark-card); color: var(--dark-text); }
    .social-link:hover { background: var(--orange); color: white; transform: translateY(-2px); }

    /* ── Cookie banner ── */
    #cookieConsent {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: var(--slate); color: white;
      padding: 1rem 5%; display: none;
      align-items: center; justify-content: center; gap: 1.5rem;
      font-size: 0.88rem; flex-wrap: wrap;
    }
    body.dark #cookieConsent { background: #0d1320; }
    #cookieConsent button {
      background: var(--orange); color: white; border: none;
      padding: 0.45rem 1.2rem; border-radius: 50px;
      font-family: 'Tabular', sans-serif; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    #cookieConsent button:hover { background: #e2661a; }

    /* ── Auth Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      z-index: 10000;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 20px;
      padding: 2.5rem; width: 100%; max-width: 400px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.2);
    }
    body.dark .modal-box { background: #111827; }
    .modal-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 2rem;
    }
    .modal-header h2 {
      font-family: 'Clash Display', 'Tabular', sans-serif;
      font-size: 1.4rem; font-weight: 600; color: var(--slate);
    }
    body.dark .modal-header h2 { color: var(--dark-text); }
    .modal-close {
      background: none; border: none; font-size: 1.4rem;
      cursor: pointer; color: #999; line-height: 1;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block; margin-bottom: 0.5rem;
      font-weight: 600; font-size: 0.85rem; color: var(--slate);
    }
    body.dark .form-label { color: var(--dark-text); }
    .form-input {
      width: 100%; padding: 0.85rem 1rem;
      border: 1.5px solid var(--cream); border-radius: 10px;
      font-family: 'Tabular', sans-serif; font-size: 0.95rem;
      color: var(--dark-slate); transition: border-color 0.2s;
    }
    body.dark .form-input {
      background: #1a2235; border-color: var(--dark-border);
      color: var(--dark-text);
    }
    .form-input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(243,112,30,0.1); }
    .form-error { color: #ef4444; font-size: 0.8rem; margin-top: 0.4rem; min-height: 1rem; }
    .btn-full {
      width: 100%; padding: 0.9rem;
      background: var(--orange); color: white; border: none;
      border-radius: 50px; font-family: 'Tabular', sans-serif;
      font-weight: 700; cursor: pointer; transition: all 0.3s;
      margin-top: 0.5rem;
    }
    .btn-full:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(243,112,30,0.35); }
    .switch-auth {
      text-align: center; margin-top: 1.2rem;
      font-size: 0.88rem; color: var(--slate);
    }
    body.dark .switch-auth { color: var(--dark-text); }
    .switch-auth a { color: var(--orange); text-decoration: none; font-weight: 600; cursor: pointer; }

    @media (max-width: 768px) {
      nav { display: none; }
      .page-hero { flex-direction: column; gap: 2rem; align-items: flex-start; }
      .hero-right { align-items: flex-start; }
      .hero-cta { justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <!-- Header -->
  <header>
    <div class="logo">Noodrop</div>
    <nav>
      <a href="landing.html">Home</a>
      <a href="index.html" class="active">Library</a>
      <a href="stack.html">Stacks</a>
      <a href="marketplace.html">Marketplace</a>
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <div class="header-right">
      <button class="auth-btn" id="authBtn">Login</button>
      <div class="theme-toggle" id="themeToggle">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </header>

  <!-- Page Hero -->
  <div class="page-hero">
    <div class="hero-left">
      <div class="eyebrow">Noodrop · Research Library</div>
      <h1>Explore<br><em>Nootropics.</em></h1>
    </div>
    <div class="hero-right">
      <div class="hero-cta">
        <a href="stack.html" class="btn-primary">Build Your Stack</a>
        <a href="marketplace.html" class="btn-secondary">Marketplace →</a>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- Search -->
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search compounds...">
    </div>

    <!-- Categories -->
    <div class="categories">
      <button class="category-btn active" data-category="all">All</button>
      <button class="category-btn" data-category="Racetams">Racetams</button>
      <button class="category-btn" data-category="Cholinergics">Cholinergics</button>
      <button class="category-btn" data-category="Stimulants">Stimulants</button>
      <button class="category-btn" data-category="Adaptogens">Adaptogens</button>
      <button class="category-btn" data-category="Miscellaneous">Miscellaneous</button>
    </div>

    <!-- Loading -->
    <div class="loading-indicator" id="loadingIndicator">
      <div class="spinner"></div>
      <span style="font-size:0.85rem;">Loading compounds...</span>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid"></div>

    <footer>
      <div class="social-links">
        <a href="https://x.com/hann_369" target="_blank" class="social-link" aria-label="X">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
        </a>
        <a href="https://www.youtube.com/@hann.369" target="_blank" class="social-link" aria-label="YouTube">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>

  <!-- Cookie Banner -->

    <span>This website uses cookies to improve your experience.</span>
    <button onclick="acceptCookies()">Accept</button>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="authTitle">Login</h2>
        <button class="modal-close" onclick="closeAuthModal()">×</button>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="loginEmail" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" required minlength="6">
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn-full">Login</button>
      </form>
      <form id="signupForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="signupEmail" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signupPassword" required minlength="6">
        </div>
        <div class="form-error" id="signupError"></div>
        <button type="submit" class="btn-full">Create Account</button>
      </form>
      <div class="switch-auth">
        <span id="switchText">No account? <a onclick="switchAuthMode()">Sign up</a></span>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDFu_w-MmLJRdiOOZoLii8-SQBN9FUtG60",
      authDomain: "noodrop-c9be9.firebaseapp.com",
      projectId: "noodrop-c9be9",
      storageBucket: "noodrop-c9be9.firebasestorage.app",
      messagingSenderId: "903301545011",
      appId: "1:903301545011:web:84a6c4ba643a9b255d7746"
    };
    firebase.initializeApp(firebaseConfig);

    // ── Dark Mode ──
    const toggle = document.getElementById('themeToggle');
    let isDark = localStorage.getItem('darkMode') === 'true';
    if (isDark) { document.body.classList.add('dark'); toggle.classList.add('active'); initDarkParticles(); }
    else { initLightParticles(); }

    toggle.addEventListener('click', () => {
      isDark = !isDark;
      document.body.classList.toggle('dark', isDark);
      toggle.classList.toggle('active', isDark);
      localStorage.setItem('darkMode', isDark);
      isDark ? initDarkParticles() : initLightParticles();
    });

    function initLightParticles() {
      particlesJS("particles-js", { particles: { number: { value: 80, density: { enable: true, value_area: 900 } }, color: { value: "#e8d8c9" }, shape: { type: "circle" }, opacity: { value: 0.5, random: true, anim: { enable: true, speed: 0.8, opacity_min: 0.1, sync: false } }, size: { value: 3, random: true }, line_linked: { enable: true, distance: 160, color: "#e8d8c9", opacity: 0.25, width: 1 }, move: { enable: true, speed: 1.2, direction: "none", random: true, out_mode: "out" } }, interactivity: { detect_on: "canvas", events: { onhover: { enable: true, mode: "bubble" }, onclick: { enable: true, mode: "push" }, resize: true } }, retina_detect: true });
    }
    function initDarkParticles() {
      particlesJS("particles-js", { particles: { number: { value: 120, density: { enable: true, value_area: 800 } }, color: { value: "#ffffff" }, shape: { type: "circle" }, opacity: { value: 0.6, random: true, anim: { enable: true, speed: 0.8, opacity_min: 0.05, sync: false } }, size: { value: 1.5, random: true }, line_linked: { enable: true, distance: 110, color: "#4a90e2", opacity: 0.12, width: 1 }, move: { enable: true, speed: 0.4, direction: "none", random: true, out_mode: "out" } }, interactivity: { detect_on: "canvas", events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true } }, retina_detect: true });
    }

    // ── Auth ──
    const authBtn = document.getElementById('authBtn');
    authBtn.addEventListener('click', () => {
      firebase.auth().currentUser ? window.location.href = 'profile.html' : openAuthModal();
    });
    firebase.auth().onAuthStateChanged(user => {
      authBtn.textContent = user ? 'Profile' : 'Login';
    });
    function openAuthModal() { document.getElementById('authModal').classList.add('open'); }
    function closeAuthModal() {
      document.getElementById('authModal').classList.remove('open');
      document.getElementById('loginError').textContent = '';
      document.getElementById('signupError').textContent = '';
    }
    function switchAuthMode() {
      const isLogin = document.getElementById('loginForm').style.display !== 'none';
      document.getElementById('loginForm').style.display = isLogin ? 'none' : 'block';
      document.getElementById('signupForm').style.display = isLogin ? 'block' : 'none';
      document.getElementById('authTitle').textContent = isLogin ? 'Sign Up' : 'Login';
      document.getElementById('switchText').innerHTML = isLogin
        ? 'Already have an account? <a onclick="switchAuthMode()">Log in</a>'
        : 'No account? <a onclick="switchAuthMode()">Sign up</a>';
    }
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        await firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        closeAuthModal();
      } catch (err) { document.getElementById('loginError').textContent = err.message; }
    });
    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        const cred = await firebase.auth().createUserWithEmailAndPassword(document.getElementById('signupEmail').value, document.getElementById('signupPassword').value);
        await firebase.firestore().collection('users').doc(cred.user.uid).set({ email: cred.user.email, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        closeAuthModal();
      } catch (err) { document.getElementById('signupError').textContent = err.message; }
    });

    // ── Cookie ──
    function acceptCookies() {
      localStorage.setItem('cookiesAccepted', 'yes');
      document.getElementById('cookieConsent').style.display = 'none';
    }
    window.addEventListener('load', () => {
      if (!localStorage.getItem('cookiesAccepted'))
        document.getElementById('cookieConsent').style.display = 'flex';
    });

    // ── Data + Cards ──
    function loadDataAndInitialize() {
      const s = document.createElement('script');
      s.src = 'data.js';
      s.onload = () => initializeApp();
      s.onerror = () => { document.getElementById('loadingIndicator').innerHTML = '<p style="color:#8a9ab0">Error loading compounds.</p>'; };
      document.head.appendChild(s);
    }

    function initializeApp() {
      document.getElementById('loadingIndicator').style.display = 'none';
      if (!window.compounds || !Array.isArray(window.compounds)) {
        document.getElementById('grid').innerHTML = '<p style="color:#8a9ab0;text-align:center;padding:2rem;">Error loading compounds.</p>';
        return;
      }
      renderCards(window.compounds);
      document.getElementById('search').addEventListener('input', e => {
        const t = e.target.value.toLowerCase();
        renderCards(window.compounds.filter(c =>
          c.name.toLowerCase().includes(t) ||
          (c.description && c.description.toLowerCase().includes(t)) ||
          (c.category && c.category.toLowerCase().includes(t)) ||
          (c.benefits && c.benefits.some(b => b.toLowerCase().includes(t)))
        ));
      });
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          const cat = e.target.dataset.category;
          renderCards(cat === 'all' ? window.compounds : window.compounds.filter(c => c.category === cat));
        });
      });
    }

    function renderCards(list) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if (!list || !list.length) {
        grid.innerHTML = '<p style="color:#8a9ab0;text-align:center;padding:3rem;grid-column:1/-1;">No compounds found.</p>';
        return;
      }
      list.forEach(comp => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-image">
            <img src="${comp.image}" alt="${comp.name}" onerror="this.parentElement.style.background='#f0ece8';this.style.display='none'">
            <div class="card-category-badge">${comp.category || 'Nootropic'}</div>
          </div>
          <div class="card-body">
            <div class="card-name">${comp.name}</div>
            <div class="card-desc">${comp.description}</div>
            <div class="card-benefits">
              ${(comp.benefits || []).slice(0, 3).map(b => `<span class="benefit-tag">${b}</span>`).join('')}
            </div>
            <div class="card-footer-row">
              <div class="card-arrow">→</div>
            </div>
          </div>
        `;
        card.onclick = () => { window.location.href = `compound.html?cid=${comp.cid}`; };
        grid.appendChild(card);
      });
    }

    document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', loadDataAndInitialize) : loadDataAndInitialize();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="metaTitle">Article — Metacognition</title>
<meta name="description" id="metaDesc" content="Metacognition research article.">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@300,400,500,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
/* ── POST LAYOUT ── */
.post-wrap {
  max-width: 720px; margin: 0 auto;
  padding: 100px 5% 80px;
}

/* BACK LINK */
.back-link {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 400; color: rgba(245,240,232,.4);
  text-decoration: none; margin-bottom: 48px;
  transition: color .2s; letter-spacing: .04em;
}
.back-link:hover { color: rgba(245,240,232,.8); }
.back-link svg { transition: transform .2s; }
.back-link:hover svg { transform: translateX(-3px); }

/* META */
.post-eyebrow {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.post-cat-pill {
  font-size: 9px; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; padding: 4px 12px; border-radius: 100px;
  background: rgba(232,84,26,.1); color: var(--orange);
  border: 1px solid rgba(232,84,26,.2);
}
.post-time {
  font-size: 11px; color: rgba(245,240,232,.35); font-weight: 300;
}

/* TITLE */
.post-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.6rem);
  font-weight: 300; letter-spacing: -.05em; line-height: .95;
  color: #F5F0E8; margin-bottom: 20px;
}

/* EXCERPT LEAD */
.post-lead {
  font-size: 17px; font-weight: 300; line-height: 1.75;
  color: rgba(245,240,232,.65); margin-bottom: 36px;
  border-left: 2px solid rgba(232,84,26,.4); padding-left: 20px;
}

/* COVER IMAGE */
.post-cover {
  width: 100%; aspect-ratio: 16/7; object-fit: cover;
  border-radius: 16px; margin-bottom: 44px;
  background: rgba(245,240,232,.04);
}
.post-cover-placeholder {
  width: 100%; aspect-ratio: 16/7;
  border-radius: 16px; margin-bottom: 44px;
  background: linear-gradient(135deg, rgba(232,84,26,.07), rgba(232,84,26,.02));
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
}

/* BODY CONTENT */
.post-body {
  font-size: 15px; font-weight: 300; line-height: 1.85;
  color: rgba(245,240,232,.72);
}
.post-body h2 {
  font-family: var(--font-display); font-size: clamp(1.4rem, 3vw, 1.9rem);
  font-weight: 400; letter-spacing: -.03em; color: #F5F0E8;
  margin: 48px 0 16px; line-height: 1.1;
}
.post-body h3 {
  font-family: var(--font-display); font-size: 1.15rem;
  font-weight: 500; letter-spacing: -.02em; color: #F5F0E8;
  margin: 32px 0 12px;
}
.post-body p { margin-bottom: 20px; }
.post-body strong { font-weight: 500; color: #F5F0E8; }
.post-body em { font-style: italic; color: rgba(245,240,232,.8); }
.post-body a { color: var(--orange); text-decoration: none; border-bottom: 1px solid rgba(232,84,26,.3); transition: border-color .2s; }
.post-body a:hover { border-color: var(--orange); }
.post-body ul, .post-body ol { padding-left: 24px; margin-bottom: 20px; }
.post-body li { margin-bottom: 8px; line-height: 1.7; }
.post-body blockquote {
  border-left: 2px solid rgba(232,84,26,.5); padding: 4px 0 4px 20px;
  margin: 28px 0; font-style: italic;
  color: rgba(245,240,232,.6);
}
.post-body hr { border: none; border-top: 1px solid rgba(245,240,232,.08); margin: 40px 0; }
.post-body code {
  font-family: 'SF Mono', monospace; font-size: 13px;
  background: rgba(245,240,232,.07); padding: 2px 7px;
  border-radius: 5px; color: rgba(232,84,26,.9);
}
.post-body pre {
  background: rgba(245,240,232,.04); border: 1px solid rgba(245,240,232,.08);
  border-radius: 10px; padding: 20px; overflow-x: auto; margin-bottom: 24px;
}
.post-body pre code { background: none; padding: 0; }

/* TAGS */
.post-tags {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin-top: 48px; padding-top: 32px;
  border-top: 1px solid rgba(245,240,232,.07);
}
.post-tag {
  font-size: 11px; padding: 4px 12px; border-radius: 100px;
  background: rgba(245,240,232,.05); color: rgba(245,240,232,.45);
  border: 1px solid rgba(245,240,232,.08);
}

/* MORE POSTS */
.more-posts-section {
  max-width: 1100px; margin: 0 auto; padding: 0 5% 80px;
}
.more-posts-section h3 {
  font-family: var(--font-display); font-size: 12px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: rgba(245,240,232,.35); margin-bottom: 24px;
}
.more-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.more-card {
  border: 1px solid rgba(245,240,232,.07); border-radius: 14px;
  padding: 22px; text-decoration: none;
  transition: border-color .2s, transform .2s;
  background: rgba(245,240,232,.02);
}
.more-card:hover { border-color: rgba(245,240,232,.16); transform: translateY(-2px); }
.more-cat { font-size: 9px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--orange); margin-bottom: 7px; }
.more-title { font-family: var(--font-display); font-size: 14px; font-weight: 400; letter-spacing: -.02em; color: #F5F0E8; line-height: 1.3; }

/* LOADING / ERROR */
.post-loading {
  text-align: center; padding: 80px 0;
  color: rgba(245,240,232,.3); font-size: 14px;
}
.post-error {
  text-align: center; padding: 80px 0;
}
.post-error h2 { font-family: var(--font-display); font-size: 28px; font-weight: 300; color: #F5F0E8; margin-bottom: 12px; }
.post-error p { color: rgba(245,240,232,.45); font-size: 14px; margin-bottom: 28px; }

/* Progress bar */
.read-progress {
  position: fixed; top: 0; left: 0; z-index: 1000;
  height: 2px; background: var(--orange);
  width: 0%; transition: width .1s linear;
}

/* light mode */
body.light .post-title { color: #141412; }
body.light .post-body { color: #4A4844; }
body.light .post-body h2, body.light .post-body h3, body.light .post-body strong { color: #141412; }
body.light .post-lead { color: #6A6460; }
body.light .more-title { color: #141412; }

@media(max-width:700px) { .more-grid { grid-template-columns: 1fr; } }
</style>
  <script src="i18n.js"></script>
</head>
<body>

<div class="read-progress" id="readProgress"></div>

<!-- HEADER -->
<header class="nd-header" id="ndHeader">
  <a href="landing.html" class="nd-logo"><span class="nd-logo-pip"></span>Metacognition</a>
  <nav class="nd-nav" id="ndNav">
    <div class="nd-nav-header"><span class="nd-nav-title">Metacognition</span><button class="nd-nav-close" id="ndNavClose">✕</button></div>
    <div class="nd-nav-links">
      <a href="landing.html"      class="nd-nav__link" data-i18n="nav.home">Home<span class="nav-arrow">›</span></a>
      <a href="index.html"        class="nd-nav__link" data-i18n="nav.library">Library<span class="nav-arrow">›</span></a>
      <a href="stack.html"        class="nd-nav__link" data-i18n="nav.stacks">Stacks<span class="nav-arrow">›</span></a>
      <a href="marketplace.html"  class="nd-nav__link" data-i18n="nav.marketplace">Marketplace<span class="nav-arrow">›</span></a>
      <a href="european-summer.html" class="nd-nav__link">European Summer<span class="nav-arrow">›</span></a>
      <a href="health.html"       class="nd-nav__link">Health<span class="nav-arrow">›</span></a>
      <a href="about.html"        class="nd-nav__link">About<span class="nav-arrow">›</span></a>
      <a href="faq.html"          class="nd-nav__link">FAQ<span class="nav-arrow">›</span></a>
      <a href="blog.html"         class="nd-nav__link" data-i18n="nav.blog" aria-current="page">Blog<span class="nav-arrow">›</span></a>
      <a href="nooai.html"        class="nd-nav__link" data-i18n="nav.nooai">NooAI<span class="nav-arrow">›</span></a>
    </div>
  </nav>
  <div class="nd-nav-backdrop" id="ndNavBackdrop"></div>
  <div class="nd-header__right">
    <button class="auth-btn" id="authBtn" data-i18n="nav.login">Login</button>
    <div class="theme-toggle" id="themeToggle"><div class="theme-toggle-inner"><div class="toggle-knob"></div></div></div>
    <button class="nd-burger" id="ndBurger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- POST CONTENT -->
<div class="post-wrap" id="postWrap">
  <div class="post-loading">Loading article…</div>
</div>

<!-- MORE POSTS -->
<div class="more-posts-section" id="moreSection" style="display:none;">
  <h3>More from the Lab</h3>
  <div class="more-grid" id="moreGrid"></div>
</div>

<!-- FOOTER -->
<footer style="padding:28px 5%;border-top:1px solid rgba(245,240,232,.05);text-align:center;">
  <p style="color:rgba(245,240,232,.26);font-size:12px;">© 2026 Metacognition · <a href="impressum.html" style="color:rgba(245,240,232,.26);text-decoration:none;">Impressum</a></p>
</footer>

<script>
/* ════ NAV / THEME ════ */
(function(){
  var h=document.getElementById('ndHeader');
  window.addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>10);},{passive:true});
  var b=document.getElementById('ndBurger'),n=document.getElementById('ndNav');
  function o(){n.classList.add('is-open');b.classList.add('is-open');var bd=document.getElementById('ndNavBackdrop');if(bd)bd.classList.add('is-open');b.setAttribute('aria-expanded','true');document.body.style.overflow='hidden';}
  function c(){n.classList.remove('is-open');b.classList.remove('is-open');var bd=document.getElementById('ndNavBackdrop');if(bd)bd.classList.remove('is-open');b.setAttribute('aria-expanded','false');document.body.style.overflow='';}
  b.addEventListener('click',function(){n.classList.contains('is-open')?c():o();});
  var x=document.getElementById('ndNavClose');if(x)x.addEventListener('click',c);
  var bk=document.getElementById('ndNavBackdrop');if(bk)bk.addEventListener('click',c);
  n.querySelectorAll('.nd-nav__link').forEach(function(a){a.addEventListener('click',c);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')c();});
  window.addEventListener('resize',function(){if(window.innerWidth>768)c();});
  var t=document.getElementById('themeToggle'),L=localStorage.getItem('ndTheme')==='light';
  function ap(l){document.body.classList.toggle('light',l);if(t)t.classList.toggle('active',l);}
  ap(L);if(t)t.addEventListener('click',function(){L=!L;localStorage.setItem('ndTheme',L?'light':'');ap(L);});
})();

/* ════ READ PROGRESS BAR ════ */
window.addEventListener('scroll', function() {
  var el = document.getElementById('postWrap');
  var bar = document.getElementById('readProgress');
  if (!el || !bar) return;
  var rect = el.getBoundingClientRect();
  var total = el.offsetHeight - window.innerHeight;
  var scrolled = -rect.top;
  var pct = Math.min(Math.max(scrolled / total * 100, 0), 100);
  bar.style.width = pct + '%';
}, { passive: true });

/* ════ LOAD POST ════ */
var db = firebase.firestore();
var postId = new URLSearchParams(window.location.search).get('id');

var CAT_EMOJI = { 'Nootropics':'⚗️', 'Skillmaxxing':'🧠', 'Science':'🔬', 'Protocols':'📋', 'default':'✦' };

function renderPost(post) {
  document.getElementById('metaTitle').textContent = post.title + ' — Metacognition';
  document.getElementById('metaDesc').setAttribute('content', post.excerpt || '');

  var d = post.publishedAt && post.publishedAt.toDate ? post.publishedAt.toDate() : new Date();
  var dateStr = d.toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});

  var coverHtml = post.coverImage
    ? '<img class="post-cover" src="'+post.coverImage+'" alt="'+post.title+'"/>'
    : '<div class="post-cover-placeholder">'+(CAT_EMOJI[post.category]||'✦')+'</div>';

  var tagsHtml = (post.tags||[]).map(function(t){return '<span class="post-tag">'+t+'</span>';}).join('');

  document.getElementById('postWrap').innerHTML =
    '<a href="blog.html" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back to Blog</a>'
    + '<div class="post-eyebrow"><span class="post-cat-pill">'+(post.category||'Research')+'</span><span class="post-time">'+dateStr+' · '+(post.readTime||5)+' min read</span></div>'
    + '<h1 class="post-title">'+post.title+'</h1>'
    + (post.excerpt ? '<p class="post-lead">'+post.excerpt+'</p>' : '')
    + coverHtml
    + '<div class="post-body">'+(post.body||'<p>Article content coming soon.</p>')+'</div>'
    + (tagsHtml ? '<div class="post-tags">'+tagsHtml+'</div>' : '');
}

function loadMore(exclude) {
  db.collection('posts').orderBy('publishedAt','desc').limit(4).get().then(function(snap) {
    var posts = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); })
      .filter(function(p){ return p.id !== exclude; }).slice(0,3);
    if (!posts.length) return;
    var grid = document.getElementById('moreGrid');
    grid.innerHTML = posts.map(function(p){
      return '<a class="more-card" href="post.html?id='+p.id+'">'
        +'<div class="more-cat">'+(p.category||'Research')+'</div>'
        +'<div class="more-title">'+p.title+'</div></a>';
    }).join('');
    document.getElementById('moreSection').style.display = 'block';
  }).catch(function(){});
}

if (!postId) {
  document.getElementById('postWrap').innerHTML =
    '<div class="post-error"><h2>No article found.</h2><p>This link doesn\'t point to a valid post.</p><a href="blog.html" style="color:var(--orange)">← Back to Blog</a></div>';
} else {
  db.collection('posts').doc(postId).get().then(function(doc) {
    if (!doc.exists) {
      document.getElementById('postWrap').innerHTML =
        '<div class="post-error"><h2>Post not found.</h2><p>This article may have been removed or the link is wrong.</p><a href="blog.html" style="color:var(--orange)">← Back to Blog</a></div>';
      return;
    }
    var post = Object.assign({ id: doc.id }, doc.data());
    renderPost(post);
    loadMore(postId);
  }).catch(function(err) {
    console.warn(err);
    document.getElementById('postWrap').innerHTML =
      '<div class="post-error"><h2>Could not load article.</h2><p>Check your connection and try again.</p><a href="blog.html" style="color:var(--orange)">← Back to Blog</a></div>';
  });
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      reg.addEventListener('updatefound', function() {
        var newSW = reg.installing;
        newSW.addEventListener('statechange', function() {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        });
      });
    }).catch(function() {});
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      window.location.reload();
    });
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'SW_UPDATED') window.location.reload();
    });
  });
}
</script>
<script>document.addEventListener("DOMContentLoaded",function(){i18n.init();});</script>
</body>
</html>
